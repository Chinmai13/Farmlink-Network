<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Crop - FarmLink Network</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/i18n.js"></script>
    <script>
         const firebaseConfig = {
  apiKey: "AIzaSyDVlCJQqbVIbWrg3jIynKiFsEB_MfY8SH8",
  authDomain: "first-project-c8a16.firebaseapp.com",
  projectId: "first-project-c8a16",
  storageBucket: "first-project-c8a16.firebasestorage.app",
  messagingSenderId: "65979514920",
  appId: "1:65979514920:web:2bc2ed40728719259ff51d",
};
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
    </script>
    <style>
        body { margin: 0; padding: 16px; font-family: Arial, sans-serif; background: #f3f9f2; min-height: 100vh; display: grid; place-items: center; }
        .container { text-align: center; background-color: #fff; padding: 24px; border-radius: 10px; width: min(92vw, 520px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { color: #2e7d32; margin-bottom: 30px; }
        .form-group { margin: 15px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #333; }
        input[type="text"], input[type="number"], input[type="file"], input[type="tel"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 12px 24px; margin: 10px 5px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }
        .btn:hover { background-color: #45a049; }
        #preview { max-width: 200px; max-height: 200px; margin-top: 10px; display: none; }
        small { color: #666; }
    </style>
</head>
<body data-i18n-title="title_addcrop">
    <div class="container">
        <h1 id="title" data-i18n="addCropTitle">Add Crop</h1>
        <form id="farmerForm">
            <div class="form-group">
                <label for="cropType" data-i18n="productName">Product Name (Crop Type):</label>
                <input type="text" id="cropType" name="cropType" required>
            </div>
            <div class="form-group">
                <label for="quantity" data-i18n="quantityKg">Quantity (kg):</label>
                <input type="number" id="quantity" name="quantity" required>
            </div>
            <div class="form-group">
                <label for="farmerName" data-i18n="farmerName">Farmer Name:</label>
                <input type="text" id="farmerName" name="farmerName" required>
            </div>
            <div class="form-group">
                <label for="farmLocation" data-i18n="farmLocation">Farm Location:</label>
                <input type="text" id="farmLocation" name="farmLocation" required>
            </div>
            <div class="form-group">
                <label for="productCost" data-i18n="costPerKg">Cost (per kg):</label>
                <input type="number" id="productCost" name="productCost" required>
            </div>
            <div class="form-group">
                <label for="contact" data-i18n="contactNumber">Contact Number:</label>
                <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" data-i18n-placeholder="contactPlaceholder" placeholder="Enter 10-digit number" required>
                <small data-i18n="contactHint">Buyers will call this number.</small>
            </div>
            <div class="form-group">
                <label for="cropImage" data-i18n="cropImage">Crop Image:</label>
                <input type="file" id="cropImage" name="cropImage" accept="image/*" required>
                <img id="preview" src="#" alt="Crop Preview" data-i18n-title="cropPreview">
            </div>
            <div>
                <button type="submit" class="btn" data-i18n="publishCrop">Publish Crop</button>
                <button type="button" class="btn" id="backBtn" data-i18n="back">Back</button>
            </div>
        </form>
    </div>
    <script>
        I18n.init();
        document.getElementById("backBtn").onclick = () => window.location.href = "index.html";

        const form = document.getElementById('farmerForm');
        const imageInput = document.getElementById('cropImage');
        const preview = document.getElementById('preview');
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const cropType = document.getElementById('cropType').value;
            const farmerName = document.getElementById('farmerName').value;
            const farmLocation = document.getElementById('farmLocation').value;
            const contact = document.getElementById('contact').value;
            const productCost = document.getElementById('productCost').value;
            const quantity = document.getElementById('quantity').value;
            const cropImageFile = imageInput.files[0];

            if (cropImageFile) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const cropImageData = ev.target.result;
                    const newProduct = {
                        cropType,
                        farmerName,
                        farmLocation,
                        contact,
                        productCost,
                        quantity,
                        cropImageData,
                        createdBy: auth.currentUser.uid,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    db.collection('products').add(newProduct)
                        .then(() => { alert(I18n.t('cropPublished')); window.location.href = 'products.html'; })
                        .catch((error) => { alert(I18n.t('errorPrefix') + error.message); });
                };
                reader.readAsDataURL(cropImageFile);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'signin.html';
                return;
            }
            db.collection('users').doc(user.uid).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.name) document.getElementById('farmerName').value = data.name;
                    if (data.phone) document.getElementById('contact').value = data.phone;
                }
            });
        });
    </script>
</body>
</html>
