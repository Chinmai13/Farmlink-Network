<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FarmLink Network</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/i18n.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #eef6ed; display: grid; place-items: center; }
    .box { width: min(92vw, 420px); background: #fff; border-radius: 12px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    h1 { margin: 0 0 14px; color: #1b5e20; text-align: center; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 11px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
    button { background: #2e7d32; color: #fff; border: 0; cursor: pointer; }
    button:hover { background: #256628; }
    .link { text-align: center; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body data-i18n-title="title_signup">
  <div class="box">
    <h1 data-i18n="createAccount">Create Account</h1>
    <input type="text" id="name" data-i18n-placeholder="fullName" placeholder="Full name" />
    <input type="tel" id="phone" data-i18n-placeholder="phoneNumber" placeholder="Phone number" />
    <input type="email" id="email" data-i18n-placeholder="email" placeholder="Email" />
    <input type="password" id="password" data-i18n-placeholder="passwordPlaceholder" placeholder="Password (6+ chars)" />
    <select id="role">
      <option value="farmer" data-i18n="farmer">Farmer</option>
      <option value="buyer" data-i18n="buyer">Buyer</option>
    </select>
    <button id="signupBtn" data-i18n="signUp">Sign Up</button>
    <div class="link"><a href="signin.html" data-i18n="alreadyRegistered">Already registered? Sign in</a></div>
  </div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDVlCJQqbVIbWrg3jIynKiFsEB_MfY8SH8",
      authDomain: "first-project-c8a16.firebaseapp.com",
      projectId: "first-project-c8a16",
      storageBucket: "first-project-c8a16.firebasestorage.app",
      messagingSenderId: "65979514920",
      appId: "1:65979514920:web:2bc2ed40728719259ff51d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    I18n.init();

    document.getElementById("signupBtn").onclick = async () => {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;
      if (!name || !phone || !email || password.length < 6) {
        alert(I18n.t("fillAllFields"));
        return;
      }
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection("users").doc(cred.user.uid).set({
          name,
          phone,
          email,
          role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
      }
    };
  </script>
</body>
</html>
