<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmLink - Products</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/i18n.js"></script>
  <script>
      const firebaseConfig = {
  apiKey: "AIzaSyDVlCJQqbVIbWrg3jIynKiFsEB_MfY8SH8",
  authDomain: "first-project-c8a16.firebaseapp.com",
  projectId: "first-project-c8a16",
  storageBucket: "first-project-c8a16.firebasestorage.app",
  messagingSenderId: "65979514920",
  appId: "1:65979514920:web:2bc2ed40728719259ff51d",
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
    header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; }
    h1 { margin: 0; }
    .products-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
    .product-item { background-color: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
    .product-item:hover { transform: scale(1.03); }
    .product-item img { width: 100%; height: 200px; object-fit: cover; }
    .product-name { padding: 10px; text-align: center; font-weight: bold; }
    .product-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; }
    .product-modal-content { background: white; border-radius: 8px; padding: 20px; width: 90%; max-width: 600px; position: relative; }
    .close-modal { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #888; }
    .modal-header { display: flex; align-items: center; gap: 10px; }
    .modal-header img { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; }
    .modal-body img { width: 100%; height: 250px; object-fit: cover; border-radius: 6px; margin-top: 10px; }
    .modal-body div { margin-top: 10px; }
    .back-container { text-align: center; margin-bottom: 30px; }
    .back-button { margin-top: 40px; padding: 12px 24px; background-color: #4CAF50; color: white; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
    .back-button:hover { background-color: #45a049; }
  </style>
</head>
<body data-i18n-title="title_products">
<header>
  <h1 data-i18n="productsHeader">FarmLink Product Listings</h1>
</header>
<div style="padding:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;background:#fff;">
  <input id="cropFilter" data-i18n-placeholder="filterByCrop" placeholder="Filter by crop" style="padding:10px;border:1px solid #ccc;border-radius:8px;min-width:220px;" />
  <input id="locationFilter" data-i18n-placeholder="filterByLocation" placeholder="Filter by location" style="padding:10px;border:1px solid #ccc;border-radius:8px;min-width:220px;" />
</div>
<div class="products-container"></div>
<div class="back-container">
  <button class="back-button" onclick="goBack()" data-i18n="backHome">Back to Home</button>
</div>
<div id="productModal" class="product-modal">
  <div class="product-modal-content">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="modal-header">
      <img id="farmerPic" class="farmer-image" src="" alt="Farmer Image" onclick="goToProfile()"/>
      <div>
        <strong id="modalFarmerName"></strong><br/>
        <small id="modalLocation"></small>
      </div>
    </div>
    <div class="modal-body">
      <img id="modalImage" src="" alt="Product Image" />
      <div><strong data-i18n="crop">Crop:</strong> <span id="modalProductName"></span></div>
      <div><strong data-i18n="contact">Contact:</strong> <span id="modalContactNumber"></span></div>
      <div><strong data-i18n="cost">Cost:</strong> <span id="modalCost"></span></div>
      <div><strong data-i18n="quantity">Quantity:</strong> <span id="modalQty"></span></div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
        <a id="callBtn" style="padding:8px 12px;background:#2e7d32;color:#fff;border-radius:6px;text-decoration:none;" target="_blank" data-i18n="call">Call</a>
        <a id="waBtn" style="padding:8px 12px;background:#1fa855;color:#fff;border-radius:6px;text-decoration:none;" target="_blank" data-i18n="whatsapp">WhatsApp</a>
        <button id="shareBtn" style="padding:8px 12px;border:0;border-radius:6px;background:#1565c0;color:#fff;cursor:pointer;" data-i18n="share">Share</button>
      </div>
      <div><strong data-i18n="reviews">Reviews:</strong> <div id="modalReview">Loading reviews...</div></div>
    </div>
  </div>
</div>
<script>
  let selectedProduct = null;
  let allProducts = [];
  let lastFiltered = [];

  function renderProducts(products) {
    lastFiltered = products;
    const container = document.querySelector(".products-container");
    container.innerHTML = "";
    products.forEach((product) => {
      if (product.cropType && product.cropImageData) {
        const item = document.createElement("div");
        item.className = "product-item";
        item.innerHTML = `
          <img src="${product.cropImageData}" alt="${product.cropType}">
          <div class="product-name">${product.cropType}</div>
        `;
        item.onclick = () => showCustomProduct(product);
        container.appendChild(item);
      }
    });
    if (!container.hasChildNodes()) {
      const p = document.createElement("p");
      p.textContent = I18n.t("noProducts");
      container.appendChild(p);
    }
  }

  function applyFilters() {
    const crop = document.getElementById("cropFilter").value.toLowerCase().trim();
    const location = document.getElementById("locationFilter").value.toLowerCase().trim();
    const filtered = allProducts.filter((p) =>
      (!crop || (p.cropType || "").toLowerCase().includes(crop)) &&
      (!location || (p.farmLocation || "").toLowerCase().includes(location))
    );
    renderProducts(filtered);
  }

  function buildShareMessage(product) {
    return I18n.t("shareFresh", { crop: product.cropType }) + "\n" +
      I18n.t("shareLine", { qty: product.quantity || "-", price: product.productCost || "-" }) + "\n" +
      (product.farmLocation || "") + "\n" +
      I18n.t("shareContact", { phone: product.contact || "" }) + "\n#Farmlink #DirectFromFarmer";
  }

  function showCustomProduct(product) {
    selectedProduct = product;
    document.getElementById("modalImage").src = product.cropImageData || '';
    document.getElementById("modalFarmerName").textContent = product.farmerName || I18n.t("na");
    document.getElementById("modalLocation").textContent = product.farmLocation || I18n.t("na");
    document.getElementById("modalContactNumber").textContent = product.contact || I18n.t("na");
    document.getElementById("modalCost").textContent = product.productCost
      ? `${product.productCost} ${I18n.t("perKg")}` : I18n.t("na");
    document.getElementById("modalQty").textContent = product.quantity
      ? `${product.quantity} ${I18n.t("kg")}` : I18n.t("na");
    document.getElementById("modalProductName").textContent = product.cropType || I18n.t("na");
    document.getElementById("farmerPic").src = product.farmerImage || "https://cdn-icons-png.flaticon.com/512/194/194931.png";
    const phone = (product.contact || "").replace(/\D/g, "");
    document.getElementById("callBtn").href = `tel:${phone}`;
    document.getElementById("waBtn").href = `https://wa.me/${phone}`;
    document.getElementById("shareBtn").onclick = async () => {
      const msg = buildShareMessage(product);
      if (navigator.share) {
        try { await navigator.share({ title: "FarmLink Crop", text: msg }); } catch (_) {}
      } else {
        await navigator.clipboard.writeText(msg);
        alert(I18n.t("shareCopied"));
      }
    };
    document.getElementById("modalReview").textContent = I18n.t("loadingReviews");
    db.collection('reviews').where('productName', '==', product.cropType).get()
      .then((querySnapshot) => {
        if (!querySnapshot.empty) {
          const reviewText = querySnapshot.docs.map(doc => `<div class="review-item"><p>${doc.data().reviewText}</p></div>`).join('');
          document.getElementById("modalReview").innerHTML = reviewText;
        } else {
          document.getElementById("modalReview").textContent = I18n.t("noReviews");
        }
      })
      .catch((error) => { alert(I18n.t("errorPrefix") + error.message); });
    document.getElementById("productModal").style.display = "flex";
    I18n.apply();
  }

  function closeModal() { document.getElementById("productModal").style.display = "none"; }
  function goToProfile() {
    if (selectedProduct) {
      localStorage.setItem("selectedFarmer", JSON.stringify(selectedProduct));
      window.location.href = "profile.html";
    }
  }
  function goBack() { window.location.href = "index.html"; }

  I18n.init();
  window.addEventListener("farmlink:langchange", () => {
    renderProducts(lastFiltered.length ? lastFiltered : allProducts);
    if (selectedProduct) showCustomProduct(selectedProduct);
  });

  window.addEventListener('DOMContentLoaded', () => {
    db.collection('products').get()
      .then((querySnapshot) => {
        querySnapshot.forEach((doc) => { allProducts.push(doc.data()); });
        renderProducts(allProducts);
      })
      .catch((error) => { alert(I18n.t("errorLoadingProducts") + error.message); });

    document.getElementById("cropFilter").addEventListener("input", applyFilters);
    document.getElementById("locationFilter").addEventListener("input", applyFilters);
  });

  auth.onAuthStateChanged((user) => {
    if (!user) window.location.href = "signin.html";
  });
</script>
</body>
</html>
